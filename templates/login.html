<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitor</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

     <style>
     body {
        background: url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e') no-repeat center center;
        background-size: cover;
     }

     .overlay {
        background-color: rgb(0, 0, 0, 0.6);
        height: 100vh;
     }

     card-custom{
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        color: white;
        border-radius: 10px;
     }



     </style>
</head>

<body>

    <div class="overlay d-flex justify-content-center align-items-center">

        <div class="card card-custom p-4 shadow" style="width: 350px;">
      
            <h3 class="text-center mb-2">⚡ Energy Monitor</h3>
            <p class="text-center mb-4">Controle inteligente de consumo</p>


            <form method="POST">
                <div class="mb-3">
                 <input name="username" class="form-control" placeholder="Usuário" required>    
                </div>

                <div class="mb-3">
                 <input name="senha" type="password" placeholder="Senha" required>    
                </div>
                <button class="btn btn-warning w-100">Entrar</button>
            </form>

   
  
    </div>
   </div>
</body>
</html>
